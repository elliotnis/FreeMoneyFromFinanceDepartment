services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MONGODB_URL: ${MONGODB_URL:-mongodb://mongo:27017}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Passwordless email login (Gmail SMTP). All optional but required for the magic-link flow.
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      MAGIC_LINK_TTL_MINUTES: ${MAGIC_LINK_TTL_MINUTES:-15}
      # Admins allowed to create/cancel classes (comma-separated emails)
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

  trading-competition-sim:
    build:
      context: ./trading-competition-sim
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${TRADING_SIM_PORT:-4173}:80"

volumes:
  mongo_data:
