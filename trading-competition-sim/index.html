<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Trading Competition</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <section class="panel auth-panel" id="authPanel">
      <div class="logo-container">
        <div class="logo-text">
          <h1>TRADING</h1>
          <span>Competition Portal</span>
        </div>
      </div>

      <h2>Student Trading Competition</h2>

      <div class="login-mode-tabs" role="tablist" aria-label="Login method">
        <button type="button" class="login-mode-tab active">Email Code</button>
      </div>

      <form id="requestCodeForm" class="form-stack">
        <div class="input-group">
          <label for="emailInput">Email</label>
          <input
            id="emailInput"
            type="email"
            autocomplete="email"
            placeholder="e.g. student@example.com"
            required
          />
          <p class="input-hint">We'll email you a one-time sign-in code.</p>
        </div>
        <button id="requestCodeBtn" class="login-btn" type="button">Email me a sign-in code</button>
      </form>
      <p id="otpHint" class="hint"></p>

      <form id="loginForm" class="form-stack code-form hidden">
        <div class="input-group">
          <label for="codeInput">6-digit code</label>
          <div class="otp-inputs" id="otpInputs" aria-label="6-digit sign-in code">
            <input class="otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Code digit 1" />
            <input class="otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="Code digit 2" />
            <input class="otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="Code digit 3" />
            <input class="otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="Code digit 4" />
            <input class="otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="Code digit 5" />
            <input class="otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="Code digit 6" />
          </div>
          <input id="codeInput" type="hidden" required />
        </div>
        <button id="loginBtn" class="login-btn" type="submit">Verify and sign in</button>
        <button id="changeEmailBtn" class="login-btn login-btn-secondary" type="button">Use a different email</button>
      </form>
      <p id="loginHint" class="hint"></p>
    </section>

    <main class="dashboard hidden" id="dashboard">
      <header class="topbar panel">
        <div>
          <h1>Competition Control Panel</h1>
          <p id="welcomeText" class="muted"></p>
        </div>
        <div class="button-row">
          <button id="logoutBtn" type="button">Logout</button>
        </div>
      </header>

      <section class="panel">
        <div class="section-head">
          <h2>Market Board</h2>
          <label>
            Simulation Year
            <select id="marketYear"></select>
          </label>
        </div>
        <p id="tradeHint" class="hint"></p>
        <div id="stockGrid" class="stock-grid"></div>
      </section>

      <section class="panel">
        <h2>Portfolio & PnL</h2>
        <div class="summary-grid" id="summaryGrid"></div>
        <div class="chart-wrap">
          <canvas id="pnlCanvas" width="900" height="280" aria-label="PnL chart"></canvas>
        </div>
      </section>

      <section class="panel">
        <h2>Your Holdings</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Stock</th>
                <th>Shares</th>
                <th>Average Cost</th>
                <th>Current Price</th>
                <th>Current Value</th>
                <th>Unrealized PnL</th>
              </tr>
            </thead>
            <tbody id="holdingsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>News Dashboard</h2>
        <div id="newsGrid" class="news-grid"></div>
      </section>
    </main>
  </div>

  <script src="app.js?v=real-email-login-20260506" type="module"></script>
</body>
</html>
