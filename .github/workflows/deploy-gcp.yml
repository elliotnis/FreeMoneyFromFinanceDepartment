# Deploy API + static web UI to Google Cloud Run on push to main/master.
#
# Prerequisites: GCP project, Artifact Registry, Workload Identity Federation,
# and GitHub Variables / Secrets — see docs/deploy-gcp.md
#
name: Deploy to GCP (Cloud Run)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-gcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install + build
        working-directory: frontend
        run: npm ci && npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend deps + syntax check
        working-directory: backend
        run: |
          python -m pip install -r app/requirements.txt
          python -m compileall -q .

  deploy:
    name: Deploy to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    if: ${{ vars.GCP_PROJECT_ID != '' }}
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION || 'asia-east2' }}
      API_SERVICE: ${{ vars.CLOUD_RUN_API_SERVICE || 'sign-up-api' }}
      WEB_SERVICE: ${{ vars.CLOUD_RUN_WEB_SERVICE || 'sign-up-web' }}
      AR_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO || 'sign-up-system' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push API image
        id: apiimg
        run: |
          IMAGE_API="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/api:${GITHUB_SHA}"
          docker build -t "${IMAGE_API}" ./backend
          docker push "${IMAGE_API}"
          echo "image=${IMAGE_API}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Deploy API to Cloud Run
        env:
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          CORS_ORIGIN_REGEX: ${{ vars.CORS_ORIGIN_REGEX || 'https://.*\\.run\\.app$' }}
        run: |
          gcloud run deploy "${API_SERVICE}" \
            --image "${{ steps.apiimg.outputs.image }}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 4 \
            --set-env-vars "^|^MONGODB_URL=${MONGODB_URL}^|^SMTP_HOST=smtp.gmail.com^|^SMTP_PORT=587^|^SMTP_USER=${SMTP_USER}^|^SMTP_PASSWORD=${SMTP_PASSWORD}^|^SMTP_FROM=${SMTP_FROM}^|^ADMIN_EMAILS=${ADMIN_EMAILS}^|^MAGIC_LINK_TTL_MINUTES=15^|^FRONTEND_URL=https://placeholder.invalid^|^CORS_ORIGIN_REGEX=${CORS_ORIGIN_REGEX}"

      - name: Get API URL
        id: api
        run: |
          URL=$(gcloud run services describe "${API_SERVICE}" --region "${REGION}" --format 'value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        id: webimg
        env:
          VITE_API_URL: ${{ steps.api.outputs.url }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          IMAGE_WEB="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/web:${GITHUB_SHA}"
          docker build \
            --build-arg "VITE_API_URL=${VITE_API_URL}" \
            -t "${IMAGE_WEB}" \
            ./frontend
          docker push "${IMAGE_WEB}"
          echo "image=${IMAGE_WEB}" >> "$GITHUB_OUTPUT"

      - name: Deploy web to Cloud Run
        run: |
          gcloud run deploy "${WEB_SERVICE}" \
            --image "${{ steps.webimg.outputs.image }}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --port 80 \
            --memory 256Mi \
            --min-instances 0 \
            --max-instances 4

      # Uses the default *.run.app URL unless you set GitHub variable PUBLIC_WEB_URL
      # (e.g. https://portal.example.com) after Cloud Run custom domain mapping.
      - name: Point API at web URL (CORS + magic-link FRONTEND_URL)
        env:
          PUBLIC_WEB_URL: ${{ vars.PUBLIC_WEB_URL }}
        run: |
          if [ -n "${PUBLIC_WEB_URL}" ]; then
            WEB_URL="${PUBLIC_WEB_URL}"
            WEB_URL="${WEB_URL%/}"
            echo "Using PUBLIC_WEB_URL for API env: ${WEB_URL}"
          else
            WEB_URL=$(gcloud run services describe "${WEB_SERVICE}" --region "${REGION}" --format 'value(status.url)')
            echo "Using Cloud Run default URL: ${WEB_URL}"
          fi
          gcloud run services update "${API_SERVICE}" \
            --region "${REGION}" \
            --update-env-vars "^|^FRONTEND_URL=${WEB_URL}^|^CORS_ORIGINS=${WEB_URL}"
